[project]
version = "1.0.0"
name = "filterx-tui"
description = "filterx gmic"
license = { file = "LICENSE" }
authors = [{ name = "Andri Berger" }]
requires-python = ">=3.14"
dependencies = [
    "imagesize",
    "textual",
    "textual-image"]

[dependency-groups]
dev = [
    "ruff",
    "textual-dev"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
    "Backend",
    "Fontend",
    "Formula",
    "build.json",
    "uread.png",
    "project.png",
    "pyproject.py"]

[project.scripts]
filterx-tui ="pyproject:pyproject"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff]
line-length = 50
target-version = "py314"
