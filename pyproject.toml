[project]
version = "1.0.0"
name = "filterx-tui"
description = "filterx generator"
license = { file = "LICENSE" }
authors = [{ name = "Andri Berger" }]
requires-python = ">=3.14"
dependencies = [
    "watchfiles",
    "imagesize",
    "numpy",
    "pillow",
    "playwright",
    "textual",
    "textual-image"]

[dependency-groups]
dev = [
    "pyright",
    "ruff",
    "textual-dev"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
include = [
    "Asset",
    "Assets",
    "Backend",
    "pyproject.py"]

[project.scripts]
filterx-tui ="pyproject:pyproject"

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I"]     # error, pyflakes, isort
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["F401"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "strict"   # off / basic / standard / strict
venvPath = "."
venv = ".venv"
include = ["backend"]
exclude = ["tests"]

